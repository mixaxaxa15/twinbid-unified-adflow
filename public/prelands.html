<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TwinBid · Preland Studio</title><link rel="stylesheet" href="/prelands.css"><style>.archive-section{border-top:1px solid var(--line);padding:15px 0}.archive-section h3{font-size:11px;margin:0 0 10px}.archive-field{display:block;font-size:10px;color:var(--muted);margin-bottom:8px}.archive-field input,.archive-field textarea,.archive-field select{display:block;width:100%;border:1px solid var(--line);border-radius:8px;padding:8px;margin-top:4px;font:inherit}.archive-field textarea{height:62px}.archive-asset{border:1px solid var(--line);padding:9px;border-radius:9px;margin-bottom:7px}.archive-asset img{width:100%;height:80px;object-fit:contain;background:#eef0e9;margin:7px 0}.archive-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}.hidden{display:none!important}</style></head>
<body>
  <header><a class="brand" href="/"><b>T</b> TwinBid</a><div class="title"><strong>Preland Studio</strong><span id="versionLabel">original</span></div><div class="actions"><button id="undoBtn">↶ Undo</button><button id="copyBtn">Создать копию</button><button id="saveBtn">Новая версия</button><button id="exportBtn" class="primary">Экспорт ZIP</button></div></header>
  <main>
    <aside class="library"><p class="eyebrow">МЕХАНИКИ</p><div id="templates"></div><div class="protected"><b>Защищённый слой</b><span>core logic</span><span>tracking</span><span>redirect + click_id</span><span>CTA events</span></div></aside>
    <section class="stage"><div class="devicebar"><button data-device="mobile" class="active">Mobile</button><button data-device="desktop">Desktop</button><span id="validationBadge">Проверка…</span></div><div id="frameWrap" class="mobile"><iframe id="preview" sandbox="allow-scripts allow-forms allow-same-origin"></iframe></div><div class="ai-box"><div><p class="eyebrow">AI-РЕДАКТОР</p><textarea id="aiPrompt" placeholder="Например: сделай тёмно-золотой стиль, переведи тексты на португальский, замени персонажа и сделай кнопку ярче"></textarea></div><button id="aiBtn" class="primary">Применить через AI ✦</button><p id="aiStatus"></p></div></section>
    <aside class="inspector"><div id="standardInspector"><p class="eyebrow">РЕДАКТОР</p><h2 id="selectionTitle">Вся страница</h2><div id="selectionHint">Кликните по элементу в превью или меняйте общие настройки.</div>
      <section><h3>Тексты</h3><label>Заголовок<input data-path="text.headline"></label><label>Подзаголовок<textarea data-path="text.subtitle"></textarea></label><label>CTA<input data-path="text.cta"></label></section>
      <section><h3>Тема</h3><div class="colors"><label>Фон<input type="color" data-path="theme.background"></label><label>Панель<input type="color" data-path="theme.surface"></label><label>Главный<input type="color" data-path="theme.primary"></label><label>Акцент<input type="color" data-path="theme.accent"></label><label>Текст<input type="color" data-path="theme.text"></label></div></section>
      <section><h3>GEO и язык</h3><div class="row"><label>GEO<input data-path="settings.geo"></label><label>Язык<input data-path="settings.language"></label></div><label>Offer URL <small>защищён от AI</small><input data-path="settings.redirectUrl"></label></section>
      <section><h3>Assets</h3><div id="assetSlots"></div></section>
      <section><h3>Версии</h3><div id="versions"></div></section></div><div id="archiveInspector" class="hidden"></div>
    </aside>
  </main>
  <input id="assetFile" type="file" accept="image/*" hidden><script src="/prelands.js" defer></script>
</body></html>
